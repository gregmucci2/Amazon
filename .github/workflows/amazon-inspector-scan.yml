name: Amazon Inspector Vulnerability Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'  # Daily scan at midnight UTC

permissions:
  contents: read
  security-events: write
  checks: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Amazon Inspector vulnerability scan
        uses: aws-actions/vulnerability-scan-github-action-for-amazon-inspector@v1.1.2
        with:
          artifact_type: archive
          artifact_path: .
        env:
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      
      - name: Upload scan results as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: amazon-inspector-results
          path: |
            inspector_scan_*.json
            inspector_scan_*.csv
            inspector_scan_*.md
          retention-days: 30
      
      - name: Display scan summary
        if: always()
        run: |
          echo "## Amazon Inspector Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f inspector_scan_*.md ]; then
            cat inspector_scan_*.md >> $GITHUB_STEP_SUMMARY
          fi
